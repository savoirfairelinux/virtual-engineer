# Helm values for the NVIDIA OpenShell gateway (control plane) running the
# Kubernetes compute driver, so agent sandboxes are scheduled as k3s Pods.
#
# Single-node dev install:
#   KUBECONFIG=/etc/rancher/k3s/k3s.yaml \
#   helm upgrade --install openshell \
#     oci://ghcr.io/nvidia/openshell/helm-chart@sha256:583bcd4eecf7a255c6201ba3b571b5207ee0f643630dfa4835e981e62c754cc7 \
#     --namespace virtual-engineer --create-namespace \
#     --wait --timeout 120s \
#     -f deploy/k8s/openshell-gateway-values.yaml \
#     --set-string server.oidc.issuer=https://keycloak.example/realms/openshell
#
# NOTE: OpenShell's Kubernetes path is upstream-EXPERIMENTAL. Validate before
# relying on it in production (see docs/adr/0001-openshell-agent-runtime.md).

nameOverride: "openshell"

image:
  repository: ghcr.io/nvidia/openshell/gateway
  tag: "0.0.83@sha256:80e898dc9ad46e4f40b8b0e8648658d0e51b83f1c2071cf4983ac6d52b9c95d6"
  pullPolicy: IfNotPresent

serviceAccount:
  create: false
  name: "ve-openshell-gateway"

server:
  # The chart's PKI init job provisions server and client certificates. CLI
  # traffic and sandbox callbacks are therefore encrypted and authenticated at
  # the transport layer, including through the loopback port-forward.
  disableTls: false

  # Sandbox pods land in the ve-agents namespace (RBAC pre-applied by
  # deploy/k8s/15-rbac-openshell.yaml).
  sandboxNamespace: "ve-agents"

  # Use the agent image already imported into the k3s containerd (k8s.io ns)
  # instead of pulling from a registry — the image is built + imported locally
  # by start.sh and never published.
  sandboxImagePullPolicy: "IfNotPresent"

  auth:
    allowUnauthenticatedUsers: false

  # The issuer is deployment-specific and must be supplied with --set-string.
  # Keycloak service accounts receive both roles; sandbox supervisors continue
  # to use gateway-minted JWTs rather than this user-facing OIDC identity.
  oidc:
    issuer: ""
    audience: "openshell-cli"
    jwksTtl: 3600
    rolesClaim: realm_access.roles
    adminRole: openshell-admin
    userRole: openshell-user
    scopesClaim: ""
    caConfigMapName: ""

  # Per-sandbox resource quotas prevent noisy-neighbour effects.
  sandbox:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

supervisor:
  image:
    repository: ghcr.io/nvidia/openshell/supervisor
    tag: "0.0.83@sha256:9f5c14d914731f84ce38e61cba4cec425a59f0aad4be0c0906342c68ba65a86f"
    pullPolicy: IfNotPresent
  # Force init-container sideload — avoids relying on ImageVolume feature-gate
  # availability in the specific k3s build.
  sideloadMethod: "init-container"

service:
  # Keep the gateway inside the cluster. Local Docker deployments reach it
  # through a loopback-only kubectl port-forward with verified mTLS.
  type: ClusterIP
  port: 8080

# pkiInitJob generates the gateway-minted sandbox JWT signing keys automatically
# as a Helm pre-install/pre-upgrade Job.  No manual key generation required.
pkiInitJob:
  enabled: true
