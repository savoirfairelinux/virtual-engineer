apiVersion: apps/v1
kind: Deployment
metadata:
  name: virtual-engineer-orchestrator
  namespace: virtual-engineer
  labels:
    app.kubernetes.io/name: virtual-engineer
    app.kubernetes.io/component: orchestrator
spec:
  # Single replica: VE owns business admission (ConcurrencyTracker) and the
  # SQLite store is RWO. Kubernetes bin-packs the OpenShell sandbox pods, not VE.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: virtual-engineer
      app.kubernetes.io/component: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: virtual-engineer
        app.kubernetes.io/component: orchestrator
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ve-ghcr-pull
      initContainers:
        - name: initialize-openshell-profile
          image: virtual-engineer-orchestrator:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              profile_dir="${XDG_CONFIG_HOME}/openshell/gateways/${OPENSHELL_GATEWAY}"
              install -d -m 0700 "${profile_dir}/mtls"
              cp /openshell-client-tls/ca.crt "${profile_dir}/mtls/ca.crt"
              cp /openshell-client-tls/tls.crt "${profile_dir}/mtls/tls.crt"
              cp /openshell-client-tls/tls.key "${profile_dir}/mtls/tls.key"
              chmod 0600 "${profile_dir}/mtls/"*
              openshell gateway remove "${OPENSHELL_GATEWAY}" >/dev/null 2>&1 || true
              openshell gateway add "${OPENSHELL_GATEWAY_ENDPOINT}" \
                --name "${OPENSHELL_GATEWAY}" \
                --oidc-issuer "${OPENSHELL_OIDC_ISSUER}" \
                --oidc-client-id "${OPENSHELL_OIDC_CLIENT_ID}" \
                --oidc-audience "${OPENSHELL_OIDC_AUDIENCE}"
          envFrom:
            - configMapRef:
                name: virtual-engineer-config
            - configMapRef:
                name: virtual-engineer-oidc
          env:
            - name: OPENSHELL_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: virtual-engineer-secret
                  key: OPENSHELL_OIDC_CLIENT_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: openshell-config
              mountPath: /openshell-config
            - name: openshell-client-tls
              mountPath: /openshell-client-tls
              readOnly: true
      containers:
        - name: orchestrator
          # Built with: --build-arg INSTALL_OPENSHELL=true --build-arg OPENSHELL_VERSION=v0.0.83
          # Pin by digest in production (image@sha256:...).
          image: virtual-engineer-orchestrator:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "dist/src/index.js"]
          envFrom:
            - configMapRef:
                name: virtual-engineer-config
            - secretRef:
                name: virtual-engineer-secret
          ports:
            - name: admin
              containerPort: 3100
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: workspaces
              mountPath: /workspaces
            - name: tmp
              mountPath: /tmp
            - name: openshell-config
              mountPath: /openshell-config
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: virtual-engineer-data
        # Ephemeral git working directory (HostGitExecutor). Push credentials
        # live only in this pod — never in the agent sandbox.
        - name: workspaces
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: openshell-config
          emptyDir: {}
        - name: openshell-client-tls
          secret:
            secretName: openshell-client-tls
            defaultMode: 0440
