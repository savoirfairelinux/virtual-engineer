# EXAMPLE secret — copy to 20-orchestrator-secret.yaml and fill in real values.
# Do NOT commit the filled-in copy. Provider credentials are configured through
# the admin UI and stored encrypted in the database.
apiVersion: v1
kind: Secret
metadata:
  name: virtual-engineer-secret
  namespace: virtual-engineer
type: Opaque
stringData:
  # Encryption key for admin OAuth/session tokens. Generate with: openssl rand -hex 32
  ADMIN_AUTH_SECRET: "REPLACE_ME"
  # Confidential Keycloak client used only for OAuth2 client_credentials.
  OPENSHELL_OIDC_CLIENT_SECRET: "REPLACE_ME"
