# EXAMPLE secret — copy to 20-orchestrator-secret.yaml and fill in real values.
# Do NOT commit the filled-in copy. Only ADMIN_AUTH_SECRET is required; provider
# credentials are configured through the admin UI and stored (encrypted) in the DB.
apiVersion: v1
kind: Secret
metadata:
  name: virtual-engineer-secret
  namespace: virtual-engineer
type: Opaque
stringData:
  # HMAC secret for admin API bearer auth. Generate with: openssl rand -hex 32
  ADMIN_AUTH_SECRET: "REPLACE_ME"
