# OpenShell gateway identity for the Kubernetes driver.
#
# OpenShell 0.0.83's Helm chart binds this ServiceAccount to its CRD-scoped
# `sandboxes` Role and grants only `get` on Pods for sandbox identity checks.
# Do not add direct Pod lifecycle, exec, attach, ConfigMap, or Secret access.
# OpenShell's supervisor Pods require an unconfined AppArmor profile and Linux
# capabilities rejected by the baseline Pod Security standard. Keep this
# namespace dedicated to sandboxes and retain restricted audit/warn reporting.
---
apiVersion: v1
kind: Namespace
metadata:
  name: ve-agents
  labels:
    app.kubernetes.io/part-of: virtual-engineer
    app.kubernetes.io/component: agent-sandboxes
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ve-openshell-gateway
  namespace: virtual-engineer
  labels:
    app.kubernetes.io/part-of: virtual-engineer
